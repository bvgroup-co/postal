name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      publish_version:
        description: "Existing Postal version to tag/release/publish"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  POSTAL_IMAGE_REPOSITORY: ghcr.io/bvgroup-co/postal

jobs:
  release-state:
    name: Release State
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      manifest_version: ${{ steps.state.outputs.manifest_version }}
      release_exists: ${{ steps.state.outputs.release_exists }}
    steps:
      - uses: actions/checkout@v4
      - id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(jq -r '.["."]' .release-please-manifest.json)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "manifest version missing" >&2
            exit 1
          fi

          echo "manifest_version=${VERSION}" >> "$GITHUB_OUTPUT"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

  release-please:
    runs-on: ubuntu-latest
    needs: release-state
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish_version == '') &&
      (needs.release-state.outputs.manifest_version != '3.4.0' || needs.release-state.outputs.release_exists == 'true')
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }} # e.g. v1.0.0
      version: ${{ steps.release-please.outputs.version }} # e.g. 1.0.0
      all: ${{ toJSON(steps.release-please.outputs) }}
    steps:
      - uses: google-github-actions/release-please-action@v3
        id: release-please
        with:
          command: manifest

  build:
    name: CI Image Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ env.POSTAL_IMAGE_REPOSITORY }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: ci
          platforms: linux/amd64

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker compose pull
        env:
          POSTAL_IMAGE: ${{ env.POSTAL_IMAGE_REPOSITORY }}:ci-${{ github.sha }}
      - run: docker compose run postal sh -c 'bundle exec rspec'
        env:
          POSTAL_IMAGE: ${{ env.POSTAL_IMAGE_REPOSITORY }}:ci-${{ github.sha }}

  release-branch:
    name: Release (branch)
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      startsWith(github.ref, 'refs/heads/') &&
      startsWith(github.ref, 'refs/heads/release-please-') != true &&
      startsWith(github.ref, 'refs/heads/dependabot/') != true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: info
        run: |
          IMAGE="${POSTAL_IMAGE_REPOSITORY}"

          REF="${GITHUB_REF#refs/heads/}"
          TAG_REF="${REF//\//-}"
          if [ -z "$REF" ]; then exit 1; fi

          VER="$(git describe --tags --always)"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "branch=${REF}" >> "$GITHUB_OUTPUT"

          echo 'tags<<EOF' >> "$GITHUB_OUTPUT"
          if [[ "$REF" == "main" ]]; then
            echo "${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "${IMAGE}:branch-${TAG_REF}" >> "$GITHUB_OUTPUT"
          fi
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.info.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: full
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.info.outputs.version }}
            BRANCH=${{ steps.info.outputs.branch }}

  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: [build, test, release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ env.POSTAL_IMAGE_REPOSITORY }}:stable
            ${{ env.POSTAL_IMAGE_REPOSITORY }}:${{ needs.release-please.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: full
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
          platforms: linux/amd64

  publish-existing-release:
    name: Publish Existing Release
    runs-on: ubuntu-latest
    needs: [build, test, release-state]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_version != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.publish_version }}
          MANIFEST_VERSION: ${{ needs.release-state.outputs.manifest_version }}
          RELEASE_EXISTS: ${{ needs.release-state.outputs.release_exists }}
        run: |
          set -euo pipefail

          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "publish_version ($VERSION) must match manifest version ($MANIFEST_VERSION)" >&2
            exit 1
          fi

          if [ "$RELEASE_EXISTS" = "true" ]; then
            echo "GitHub release $VERSION already exists" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Git tag $VERSION already exists" >&2
            exit 1
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { printing = 1 }
            printing && /^## \\[/ && $0 !~ "^## \\[" version "\\]" { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $VERSION" >&2
            exit 1
          fi

          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes-file release-notes.md
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ env.POSTAL_IMAGE_REPOSITORY }}:stable
            ${{ env.POSTAL_IMAGE_REPOSITORY }}:${{ inputs.publish_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: full
          build-args: |
            VERSION=${{ inputs.publish_version }}
          platforms: linux/amd64
